<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Choose Our Movie ❤️</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body class="movie-page">

    <!-- Background -->

    <div class="gradient-bg"></div>

    <!-- Floating Hearts -->

    <div id="heart-container"></div>

    <!-- Movie Selection Card -->

    <div class="movie-container">

        <h1>

            Yayyy!! ❤️

        </h1>

        <p>

            Now choose our movie for Tuesday 🍿

        </p>

        <div class="movie-grid">

            <div
                class="movie-card"
                data-movie="Welcome To The Jungle">

                <img
                    src="assets/welcome.jpg"
                    alt="Welcome To The Jungle">

                <h2>

                    Welcome To The Jungle

                </h2>

            </div>

            <div
                class="movie-card"
                data-movie="Cocktail 2">

                <img
                    src="assets/cocktail 2.jpg"
                    alt="Cocktail 2">

                <h2>

                    Cocktail 2

                </h2>

            </div>

        </div>

        <button
            id="continueBtn">

            Continue ❤️

        </button>

    </div>

    <!-- Background Music -->

    <audio
        id="bgMusic"
        loop>

        <source
            src="assets/Teenage dream.mp3"
            type="audio/mp3">

    </audio>

    <script src="script.js"></script>

</body>

</html>
