<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Movie Date ❤️</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- ==========================
        LOADER
========================== -->

<div id="loader">

    <div class="loader-content">

        <div class="film">
            🎬
        </div>

        <h1>
            Loading Something Special...
        </h1>

        <p>
            Just For Pineapple 🍍❤️
        </p>

        <div class="dots">

            <span></span>
            <span></span>
            <span></span>

        </div>

    </div>

</div>

<!-- Background -->

<div class="gradient-bg"></div>

<div id="heart-container"></div>

<!-- ==========================
        MAIN CARD
========================== -->

<div class="glass-card">

    <h3 class="hello">

        🍍 Hey Pineapple

    </h3>

    <h1 class="question">

        Wanna Go For A Movie
        This Tuesday?

    </h1>

    <p class="subtitle">

        Just you & me 🍿

        <br><br>

        You just bring your beautiful smile ❤️

    </p>

    <div class="buttons">

        <button
            id="yesBtn"
            class="yes-btn">

            Yes!! ❤️

        </button>

        <button
            id="noBtn"
            class="no-btn">

            No 😶

        </button>

    </div>

</div>

<!-- Music -->

<audio
    id="bgMusic"
    loop>

    <source
        src="assets/Teenage dream.mp3"
        type="audio/mp3">

</audio>

<script src="script.js"></script>

</body>

</html>
